name: Build, Push and Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch: # Permite ejecución manual

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set lowercase image prefix
        id: prep
        run: |
          echo "image_prefix=$(echo '${{ env.IMAGE_PREFIX }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend
        uses: docker/build-push-action@v6
        with:
          context: ./bbonemx-back
          file: ./bbonemx-back/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ steps.prep.outputs.image_prefix }}/backend:latest

      - name: Build and push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./bbonemx-front
          file: ./bbonemx-front/Dockerfile
          push: true
          build-args: |
            VITE_GRAPHQL_URL=${{ secrets.VITE_GRAPHQL_URL }}
            VITE_FIREBASE_API_KEY=${{ secrets.VITE_FIREBASE_API_KEY }}
            # ... (agrega el resto de tus secretos de VITE aquí)
          tags: |
            ${{ env.REGISTRY }}/${{ steps.prep.outputs.image_prefix }}/frontend:latest

  deploy-vps:
    needs: build-and-push # <--- ESTA ES LA CLAVE: Espera a que termine la construcción
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          script: |
            set -e
            cd ${{ secrets.VPS_APP_PATH }}
            
            # Autenticarse en GHCR en el VPS (Necesario si el repo es privado)
            # echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            
            # Forzar la descarga de la nueva imagen "latest"
            docker compose -f docker-compose.prod.yml pull
            
            # Levantar contenedores SIN el flag --build
            docker compose -f docker-compose.prod.yml up -d
            
            # Limpiar imágenes viejas que se quedaron sin tag en el VPS (ahorra disco)
            docker image prune -f