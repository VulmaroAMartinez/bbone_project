services:
  nginx:
    image: nginx:1.27-alpine
    depends_on:
      - frontend
      - backend
    # Solo accesible localmente en el puerto 8080 para que Plesk haga el Proxy Inverso
    ports:
      - '127.0.0.1:8080:80'
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  frontend:
    # Ahora apunta a la imagen generada por tu CI/CD en GitHub
    image: ghcr.io/vulmaroamartinez/bbone_project/frontend:latest
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  backend:
    # Ahora apunta a la imagen generada por tu CI/CD en GitHub
    image: ghcr.io/vulmaroamartinez/bbone_project/backend:latest
    env_file:
      - ./bbonemx-back/.env
    environment:
      NODE_ENV: production
      PORT: 3000
      DB_HOST: postgres
      DB_PORT: 5432
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      - postgres
      - redis
    volumes:
      - uploads_data:/app/uploads
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  redis:
    image: redis:7-alpine
    restart: unless-stopped

volumes:
  postgres_data:
  uploads_data: